<!DOCTYPE html>
<html lang="en">
<head>
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">
                <i class="fa-solid fa-graduation-cap fa-lg"></i> Student Portal
            </a>
            <a href="{% url 'student_logout' %}" class="btn btn-light btn-sm">Logout</a>
        </div>
    </nav>
    
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-success text-white">
                        <h4><i class="fa-solid fa-user-graduate"></i> My Information</h4>
                    </div>
                    <div class="card-body">
                        <table class="table table-borderless">
                            <tr>
                                <th width="40%">Student Number:</th>
                                <td>{{ student.student_number }}</td>
                            </tr>
                            <tr>
                                <th>Full Name:</th>
                                <td>{{ student.first_name }} {{ student.last_name }}</td>
                            </tr>
                            <tr>
                                <th>Email:</th>
                                <td>{{ student.email }}</td>
                            </tr>
                            <tr>
                                <th>Field of Study:</th>
                                <td>{{ student.field_of_study }}</td>
                            </tr>
                            <tr>
                                <th>GPA:</th>
                                <td><span class="badge bg-primary fs-5">{{ student.gpa }}</span></td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <footer class="mt-5 mb-4">
        <div class="text-center">
            <span>Copyright &copy; <script>document.write(new Date().getFullYear())</script> Godwin's Palace Academy.</span>
        </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
